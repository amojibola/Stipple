worker_processes auto;

# Writable by the nginx user (non-root) — required when not running as root
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Redirect all nginx temp directories to /tmp so the nginx user can write to them
    client_body_temp_path /tmp/nginx-client-temp;
    proxy_temp_path       /tmp/nginx-proxy-temp;
    fastcgi_temp_path     /tmp/nginx-fastcgi-temp;
    uwsgi_temp_path       /tmp/nginx-uwsgi-temp;
    scgi_temp_path        /tmp/nginx-scgi-temp;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 12m;

    # Docker's embedded DNS — allows lazy hostname resolution per request
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Rate limiting zones ──────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/m;
    # KNOWN GAP: spec requires 20 req/hour per user. Nginx supports r/s and r/m
    # only — r/h is not a valid unit. 1r/m equals approximately 60 req/hour per IP,
    # which is 3x more permissive than intended. Precise per-user 20/hour enforcement
    # requires a Redis counter in the application layer and is not yet implemented.
    limit_req_zone $binary_remote_addr zone=upload:10m  rate=1r/m;
    limit_req_zone $binary_remote_addr zone=preview:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m     rate=100r/m;

    # ── HTTP server (redirects to HTTPS in production once TLS is active) ────
    server {
        listen 8080;
        server_name _;

        # ── Security headers ─────────────────────────────────────────────────
        # HSTS must only be enabled when HTTPS is active. Setting it on a plain
        # HTTP server instructs browsers to require HTTPS for future requests,
        # which will break the site if TLS is not actually configured.
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # 'unsafe-inline' required for Next.js App Router hydration scripts.
        # 'unsafe-eval' required for Next.js dev mode webpack eval-based source maps.
        # Both can be replaced with nonce-based CSP in Layer 6 security hardening.
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'" always;

        # ── Block /health/detailed from public ───────────────────────────────
        location = /api/v1/health/detailed {
            return 404;
        }

        # ── Auth endpoints — rate limited ─────────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=3 nodelay;
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Image upload — rate limited ───────────────────────────────────────
        location /api/v1/images/upload {
            limit_req zone=upload burst=5 nodelay;
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Preview — CPU-heavy, tighter rate limit ───────────────────────────
        location ~ ^/api/v1/images/[^/]+/preview$ {
            limit_req zone=preview burst=5 nodelay;
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── General API — rate limited ─────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Frontend (with WebSocket support for Next.js HMR) ─────────────────
        location / {
            set $frontend_upstream http://frontend:3000;
            proxy_pass $frontend_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_http_version 1.1;
        }
    }

    # ── TLS server block — activate in Layer 7 after Certbot issues certs ────
    # Steps to activate:
    #   1. Place fullchain.pem and privkey.pem in nginx/certs/
    #   2. Uncomment this server block
    #   3. Change the HTTP server block above to return 301 redirect to HTTPS
    #   4. Reload nginx: docker compose exec nginx nginx -s reload
    #
    # server {
    #     listen 8080 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #
    #     # HSTS — safe here because this block only activates when TLS is live
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # (copy all location blocks from the HTTP server above)
    # }
}
